<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danny – Karaoke</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@600;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --red: #e8001c; --yellow: #ffd700; --black: #000; --white: #fff; }

  body {
    background: var(--black); color: var(--white);
    font-family: 'Inter', sans-serif;
    height: 100vh; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }

  .header {
    position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
    font-family: 'Oswald', sans-serif; font-weight: 500;
    font-size: clamp(0.9rem, 1.5vw, 1.2rem);
    letter-spacing: 0.4em; color: #555; white-space: nowrap; z-index: 20;
    text-transform: uppercase;
  }

  /* ── UPLOAD SCREEN ── */
  #upload-screen {
    position: fixed; inset: 0; background: var(--black);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 50; gap: 1.8rem;
  }
  #upload-screen h1 {
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: clamp(5rem, 14vw, 11rem); color: var(--red);
    letter-spacing: 0.05em; line-height: 1;
  }
  #upload-screen .subtitle { font-size: clamp(0.9rem, 1.7vw, 1.2rem); color: #555; letter-spacing: 0.3em; text-transform: uppercase; }

  #drop-zone {
    width: min(480px, 80vw); padding: 2.5rem 2rem;
    border: 3px dashed #333;
    text-align: center; cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  #drop-zone:hover, #drop-zone.drag-over { border-color: var(--red); background: rgba(232,0,28,0.05); }
  #drop-zone .icon { font-size: 3rem; margin-bottom: 0.8rem; }
  #drop-zone p { font-size: clamp(0.9rem, 1.5vw, 1.1rem); color: #888; line-height: 1.6; font-weight: 600; }
  #drop-zone p strong { color: var(--white); }
  #file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  #file-name {
    font-size: 0.95rem; color: var(--yellow); letter-spacing: 0.05em;
    display: none; text-align: center; font-weight: 700;
  }

  .btn {
    padding: 1rem 3rem; font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: 1.6rem; letter-spacing: 0.15em; border: none; cursor: pointer;
    transition: background 0.2s, transform 0.1s; text-transform: uppercase;
    background: var(--red); color: var(--white); display: none;
  }
  .btn:hover { background: #ff1a30; transform: scale(1.04); }
  .btn.visible { display: block; }

  /* ── KARAOKE SCREEN ── */
  #karaoke-screen { display: none; position: fixed; inset: 0; flex-direction: column; align-items: center; }
  #karaoke-screen.active { display: flex; }

  #karaoke-screen::before, #karaoke-screen::after {
    content: ''; position: absolute; left: 0; right: 0; height: 25vh;
    pointer-events: none; z-index: 10;
  }
  #karaoke-screen::before {
    top: 0;
    background: linear-gradient(to bottom, var(--black) 30%, transparent);
  }
  #karaoke-screen::after {
    bottom: 0;
    background: linear-gradient(to top, var(--black) 30%, transparent);
  }

  #scroll-wrap {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center;
    position: relative; overflow: hidden;
  }
  #lyrics-track {
    display: flex; flex-direction: column;
    align-items: center; gap: 3.5rem;
    padding: 50vh 4vw;
    will-change: transform;
  }

  .lyric-line {
    font-family: 'Inter', sans-serif; font-weight: 800;
    font-size: clamp(2.8rem, 7vw, 6rem);
    line-height: 1.2; text-align: center;
    transition: opacity 0.4s, transform 0.4s;
    opacity: 0.18;
    transform: scale(0.92);
    color: var(--white);
    letter-spacing: -0.01em;
  }
  .lyric-line.chorus {
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: clamp(3.5rem, 9vw, 8rem);
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .lyric-line.aside {
    font-size: clamp(1.8rem, 4.5vw, 4rem);
    font-style: italic; font-weight: 600;
    color: #777;
  }
  .lyric-line.active { opacity: 1; transform: scale(1); }
  .lyric-line.near { opacity: 0.45; transform: scale(0.96); }

  .word {
    display: inline-block; position: relative;
    padding: 0 0.25em; margin: 0 0.05em;
    color: inherit;
  }
  .word::before {
    content: ''; position: absolute; inset: -0.05em -0.05em;
    background: var(--yellow);
    transform-origin: left center;
    transform: scaleX(0);
    z-index: -1;
  }
  .word.singing { color: #000 !important; }
  .word.singing::before { transform: scaleX(1); transition: transform var(--word-dur,0.3s) linear; }
  .word.done { color: #000 !important; }
  .word.done::before { transform: scaleX(1); }
  .lyric-line.aside .word.singing::before,
  .lyric-line.aside .word.done::before { background: var(--red); }
  .lyric-line.aside .word.singing,
  .lyric-line.aside .word.done { color: var(--white) !important; }

  /* ── AUDIO CONTROLS BAR ── */
  #audio-controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.95) 50%, transparent);
    padding: 12px 24px 18px; z-index: 30;
    display: flex; flex-direction: column; gap: 6px;
  }

  /* Time display */
  .time-row {
    display: flex; align-items: center; gap: 12px;
    font-family: 'Oswald', sans-serif; font-weight: 500;
    font-size: 0.95rem; color: #aaa; letter-spacing: 0.1em;
  }

  /* Custom seek bar */
  #seek-bar {
    flex: 1; height: 8px; background: #222;
    border-radius: 4px; cursor: pointer; position: relative;
    overflow: visible;
  }
  #seek-fill {
    height: 100%; background: var(--red); width: 0%;
    border-radius: 4px; pointer-events: none;
  }
  #seek-handle {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 18px; height: 18px; background: var(--red);
    border-radius: 50%; left: 0%;
    box-shadow: 0 0 8px rgba(232,0,28,0.6);
    pointer-events: none;
  }
  #seek-bar:hover #seek-handle { width: 22px; height: 22px; }

  /* Play / pause button */
  .ctrl-btn {
    background: transparent; border: none; color: var(--white);
    font-size: 1.6rem; cursor: pointer; padding: 4px 8px;
    transition: color 0.15s;
  }
  .ctrl-btn:hover { color: var(--yellow); }

  /* COUNTDOWN - bottom right */
  #countdown {
    position: fixed; bottom: 100px; right: 60px;
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: clamp(4rem, 10vw, 8rem);
    color: var(--yellow);
    z-index: 25;
    opacity: 0;
    pointer-events: none;
    line-height: 1;
    text-shadow: 0 0 30px rgba(255,215,0,0.5);
  }
  #countdown.show { animation: countdownPulse 1s ease-out; }
  @keyframes countdownPulse {
    0%   { opacity: 0; transform: scale(0.5); }
    20%  { opacity: 1; transform: scale(1.15); }
    80%  { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.95); }
  }

  /* End screen */
  #end-screen {
    display: none; position: fixed; inset: 0; background: var(--black);
    flex-direction: column; align-items: center; justify-content: center; z-index: 60;
  }
  #end-screen.show { display: flex; }
  #end-screen h2 {
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: clamp(2.5rem, 9vw, 7rem);
    color: var(--yellow); text-align: center;
    letter-spacing: 0.05em;
  }
  #end-screen p { font-size: clamp(1rem, 2vw, 1.4rem); color: var(--red); margin-top: 1rem;
    letter-spacing: 0.2em; font-weight: 700; text-transform: uppercase; }

  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 200; }
  .cp { position: absolute; opacity: 0; animation: fall 3s ease-in forwards; }
  @keyframes fall {
    0%   { opacity: 1; transform: translateY(-20px) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }
</style>
</head>

// ─── BUILD DOM ──────────────────────────────────────────────────────────────
const track = document.getElementById('lyrics-track');
const lineEls = [];

lines.forEach((line, i) => {
  const p = document.createElement('p');
  p.className = 'lyric-line' + (line.type ? ' ' + line.type : '');
  p.dataset.idx = i;

  line.words.forEach((wd, wi) => {
    const span = document.createElement('span');
    span.className = 'word';
    span.textContent = wd.w;
    const nextT = wi + 1 < line.words.length ? line.words[wi+1].t : (line.endT || (wd.t + 0.6));
    const dur = Math.max(0.12, nextT - wd.t);
    span.dataset.startT = wd.t;
    span.dataset.dur = dur;
    p.appendChild(span);
    p.appendChild(document.createTextNode(' '));
  });

  track.appendChild(p);
  lineEls.push(p);
});

  if (!audio.duration) return;
  const rect = seekBar.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.currentTime = audio.duration * ratio;
  // Reset countdown states based on new position
  resetCountdownStates(audio.currentTime);
  // Force scroll to update immediately
  currentLineIdx = -1;
}

audio.addEventListener('loadedmetadata', () => {
  timeTotal.textContent = formatTime(audio.duration);
});
audio.addEventListener('play', () => { playPauseBtn.textContent = '⏸'; });
audio.addEventListener('pause', () => { playPauseBtn.textContent = '▶'; });

function formatTime(t) {
  if (!isFinite(t)) return '0:00';
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60).toString().padStart(2, '0');
  return m + ':' + s;
}

// Keyboard shortcuts: space = play/pause, arrows = seek
document.addEventListener('keydown', e => {
  if (!document.getElementById('karaoke-screen').classList.contains('active')) return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  else if (e.code === 'ArrowRight') { e.preventDefault(); audio.currentTime = Math.min(audio.duration, audio.currentTime + 5); resetCountdownStates(audio.currentTime); currentLineIdx = -1; }
  else if (e.code === 'ArrowLeft') { e.preventDefault(); audio.currentTime = Math.max(0, audio.currentTime - 5); resetCountdownStates(audio.currentTime); currentLineIdx = -1; }
});

// ─── KARAOKE RUNTIME ────────────────────────────────────────────────────────
let raf = null;
let currentLineIdx = -1;
const countdownEl = document.getElementById('countdown');
// Each target has 3 flags
let countdownStates = COUNTDOWN_TARGETS.map(() => ({ shown3: false, shown2: false, shown1: false }));

function resetCountdownStates(currentT) {
  countdownStates = COUNTDOWN_TARGETS.map(target => ({
    shown3: currentT > target - 3,
    shown2: currentT > target - 2,
    shown1: currentT > target - 1,
  }));
}

function startKaraoke() {
  document.getElementById('upload-screen').style.display = 'none';
  document.getElementById('karaoke-screen').classList.add('active');
  audio.play();
  raf = requestAnimationFrame(tick);
}

function getActiveLineIdx(t) {
  let idx = -1;
  for (let i = 0; i < lines.length; i++) {
    const nextT = i + 1 < lines.length ? lines[i+1].t : Infinity;
    if (t >= lines[i].t && t < nextT) { idx = i; break; }
  }
  return idx;
}

function showCountdown(num) {
  countdownEl.textContent = num;
  countdownEl.classList.remove('show');
  void countdownEl.offsetWidth;
  countdownEl.classList.add('show');
}

function tick() {
  const t = audio.currentTime;
  const dur = audio.duration || 1;

  // Update playback UI
  const pct = Math.min(100, (t / dur) * 100);
  seekFill.style.width = pct + '%';
  seekHandle.style.left = pct + '%';
  timeCurrent.textContent = formatTime(t);

  // Countdowns - check each target
  COUNTDOWN_TARGETS.forEach((target, idx) => {
    const state = countdownStates[idx];
    const til = target - t;
    if (til <= 3 && til > 2 && !state.shown3) { showCountdown('3'); state.shown3 = true; }
    else if (til <= 2 && til > 1 && !state.shown2) { showCountdown('2'); state.shown2 = true; }
    else if (til <= 1 && til > 0 && !state.shown1) { showCountdown('1'); state.shown1 = true; }
  });

  const activeIdx = getActiveLineIdx(t);

  lineEls.forEach((el, i) => {
    const dist = i - activeIdx;
    el.classList.remove('active', 'near');
    if (dist === 0) el.classList.add('active');
    else if (Math.abs(dist) <= 2) el.classList.add('near');
  });

  if (activeIdx >= 0 && activeIdx !== currentLineIdx) {
    currentLineIdx = activeIdx;
    const el = lineEls[activeIdx];
    const trackTop = track.getBoundingClientRect().top;
    const elTop = el.getBoundingClientRect().top;
    const elMid = elTop - trackTop + el.offsetHeight / 2;
    const targetY = -(elMid - window.innerHeight / 2);
    track.style.transition = 'transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94)';
    track.style.transform = `translateY(${targetY}px)`;
  }

  // Word highlight - reset all and re-evaluate (handles seeking properly)
  if (activeIdx >= 0) {
    lineEls[activeIdx].querySelectorAll('.word').forEach(span => {
      const st = parseFloat(span.dataset.startT);
      const wdur = parseFloat(span.dataset.dur);
      if (t < st) {
        span.classList.remove('singing', 'done');
        span.style.removeProperty('--word-dur');
      } else if (t >= st && t < st + wdur) {
        if (!span.classList.contains('singing')) {
          span.style.setProperty('--word-dur', wdur.toFixed(2) + 's');
          span.classList.remove('done');
          span.classList.add('singing');
        }
      } else {
        span.classList.remove('singing');
        span.classList.add('done');
      }
    });
  }

  // Reset all words in non-active lines if we seeked backward
  lineEls.forEach((el, i) => {
    if (i !== activeIdx) {
      el.querySelectorAll('.word').forEach(span => {
        const st = parseFloat(span.dataset.startT);
        const wdur = parseFloat(span.dataset.dur);
        if (t < st) {
          span.classList.remove('singing', 'done');
        } else if (t >= st + wdur) {
          if (!span.classList.contains('done')) {
            span.classList.remove('singing');
            span.classList.add('done');
          }
        }
      });
    }
  });

  raf = requestAnimationFrame(tick);
}

audio.addEventListener('ended', showEnd);

function showEnd() {
  cancelAnimationFrame(raf);
  document.getElementById('karaoke-screen').classList.remove('active');
  document.getElementById('end-screen').classList.add('show');
  launchConfetti();
}

function launchConfetti() {
  const c = document.getElementById('confetti');
  const cols = ['#e8001c','#ffd700','#ffffff','#ff6b6b','#ffd93d'];
  for (let i = 0; i < 150; i++) {
    const el = document.createElement('div');
    el.className = 'cp';
    el.style.cssText = `left:${Math.random()*100}vw;top:-20px;width:${6+Math.random()*12}px;height:${6+Math.random()*12}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-delay:${Math.random()*2.5}s;animation-duration:${2+Math.random()*2}s;`;
    c.appendChild(el);
  }
}
</script>
